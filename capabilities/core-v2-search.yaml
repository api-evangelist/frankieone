naftiko: 1.0.0-alpha2
info:
  label: Core V2 API — Search
  description: 'Core V2 API — Search. 1 operations. Lead operation: Search for profiles. Self-contained Naftiko capability
    covering one Frankieone business surface.'
  tags:
  - Frankieone
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRANKIEONE_API_KEY: FRANKIEONE_API_KEY
capability:
  consumes:
  - type: http
    namespace: core-v2-search
    baseUri: https://api.uat.frankie.one
    description: Core V2 API — Search business capability. Self-contained, no shared references.
    resources:
    - name: v2-search-serviceprofiles
      path: /v2/search/serviceprofiles
      operations:
      - name: searchprofiles
        method: POST
        description: Search for profiles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.FRANKIEONE_API_KEY}}'
  exposes:
  - type: rest
    namespace: core-v2-search-rest
    port: 8080
    description: REST adapter for Core V2 API — Search. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v2/search/serviceprofiles
      name: v2-search-serviceprofiles
      description: REST surface for v2-search-serviceprofiles.
      operations:
      - method: POST
        name: searchprofiles
        description: Search for profiles
        call: core-v2-search.searchprofiles
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: core-v2-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for Core V2 API — Search. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: search-profiles
      description: Search for profiles
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: core-v2-search.searchprofiles
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
