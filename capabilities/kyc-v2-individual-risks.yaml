naftiko: 1.0.0-alpha2
info:
  label: KYC V2 API — Individual Risks
  description: 'KYC V2 API — Individual Risks. 1 operations. Lead operation: Update an individual entity''s risk level for
    a service profile.. Self-contained Naftiko capability covering one Frankieone business surface.'
  tags:
  - Frankieone
  - Individual Risks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRANKIEONE_API_KEY: FRANKIEONE_API_KEY
capability:
  consumes:
  - type: http
    namespace: kyc-v2-individual-risks
    baseUri: https://api.uat.frankie.one
    description: KYC V2 API — Individual Risks business capability. Self-contained, no shared references.
    resources:
    - name: v2-individuals-entityId-serviceprofiles-serviceName-risk
      path: /v2/individuals/{entityId}/serviceprofiles/{serviceName}/risk
      operations:
      - name: updateindividualrisklevel
        method: PATCH
        description: Update an individual entity's risk level for a service profile.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.FRANKIEONE_API_KEY}}'
  exposes:
  - type: rest
    namespace: kyc-v2-individual-risks-rest
    port: 8080
    description: REST adapter for KYC V2 API — Individual Risks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/individuals/{entityid}/serviceprofiles/{servicename}/risk
      name: v2-individuals-entityid-serviceprofiles-servicename-risk
      description: REST surface for v2-individuals-entityId-serviceprofiles-serviceName-risk.
      operations:
      - method: PATCH
        name: updateindividualrisklevel
        description: Update an individual entity's risk level for a service profile.
        call: kyc-v2-individual-risks.updateindividualrisklevel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kyc-v2-individual-risks-mcp
    port: 9090
    transport: http
    description: MCP adapter for KYC V2 API — Individual Risks. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: update-individual-entity-s-risk-level
      description: Update an individual entity's risk level for a service profile.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kyc-v2-individual-risks.updateindividualrisklevel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
