        method: GET
        description: Get a list of external references
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-individuals-entityId-externalreferences-referenceId
      path: /v2/individuals/{entityId}/externalreferences/{referenceId}
      operations:
      - name: deleteexternalreference
        method: DELETE
        description: Delete an external reference
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-individuals-entityId-names-nameId
      path: /v2/individuals/{entityId}/names/{nameId}
      operations:
      - name: deletename
        method: DELETE
        description: Delete a name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-individuals-entityId-phonenumbers-phoneNumberId
      path: /v2/individuals/{entityId}/phonenumbers/{phoneNumberId}
      operations:
      - name: deletephonenumber
        method: DELETE
        description: Delete phone number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FRANKIEONE_API_KEY}}'
  exposes:
