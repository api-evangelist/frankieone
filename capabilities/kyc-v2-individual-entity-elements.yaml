naftiko: 1.0.0-alpha2
info:
  label: KYC V2 API — Individual Entity Elements
  description: 'KYC V2 API — Individual Entity Elements. 8 operations. Lead operation: Delete an address. Self-contained Naftiko
    capability covering one Frankieone business surface.'
  tags:
  - Frankieone
  - Individual Entity Elements
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRANKIEONE_API_KEY: FRANKIEONE_API_KEY
capability:
  consumes:
  - type: http
    namespace: kyc-v2-individual-entity-elements
    baseUri: https://api.uat.frankie.one
    description: KYC V2 API — Individual Entity Elements business capability. Self-contained, no shared references.
    resources:
    - name: v2-individuals-entityId-addresses-addressId
      path: /v2/individuals/{entityId}/addresses/{addressId}
      operations:
      - name: deleteaddress
        method: DELETE
        description: Delete an address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-individuals-entityId-consents-consentType
      path: /v2/individuals/{entityId}/consents/{consentType}
      operations:
      - name: deleteconsent
        method: DELETE
        description: Withdraw a previously provided consent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-individuals-entityId-datesOfBirth-dateOfBirthId
      path: /v2/individuals/{entityId}/datesOfBirth/{dateOfBirthId}
      operations:
      - name: deletedob
        method: DELETE
        description: Delete a date of birth
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-individuals-entityId-emailaddresses-emailAddressId
      path: /v2/individuals/{entityId}/emailaddresses/{emailAddressId}
      operations:
      - name: deleteemailaddress
        method: DELETE
        description: Delete an email address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-individuals-entityId-externalreferences
      path: /v2/individuals/{entityId}/externalreferences
      operations:
