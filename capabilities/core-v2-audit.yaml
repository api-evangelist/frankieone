naftiko: 1.0.0-alpha2
info:
  label: Core V2 API — Audit
  description: 'Core V2 API — Audit. 1 operations. Lead operation: List audit events. Self-contained Naftiko capability covering
    one Frankieone business surface.'
  tags:
  - Frankieone
  - Audit
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRANKIEONE_API_KEY: FRANKIEONE_API_KEY
capability:
  consumes:
  - type: http
    namespace: core-v2-audit
    baseUri: https://api.uat.frankie.one
    description: Core V2 API — Audit business capability. Self-contained, no shared references.
    resources:
    - name: v2-audit
      path: /v2/audit
      operations:
      - name: listauditevents
        method: GET
        description: List audit events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FRANKIEONE_API_KEY}}'
  exposes:
  - type: rest
    namespace: core-v2-audit-rest
    port: 8080
    description: REST adapter for Core V2 API — Audit. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v2/audit
      name: v2-audit
      description: REST surface for v2-audit.
      operations:
      - method: GET
        name: listauditevents
        description: List audit events
        call: core-v2-audit.listauditevents
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: core-v2-audit-mcp
    port: 9090
    transport: http
    description: MCP adapter for Core V2 API — Audit. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-audit-events
      description: List audit events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: core-v2-audit.listauditevents
      outputParameters:
      - type: object
        mapping: $.
